# Job Agent backend stack. AI is configured in infra/secret/.env.backend.
#
# Run modes:
#   Fully-local AI:          docker compose --profile local-ai up -d
#   Cloud (Ollama/OpenAI):   docker compose up -d        # no local model container
# Create tables once after first boot:
#   docker compose run --rm api alembic upgrade head
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-job_agent}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-job_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local Ollama for on-machine models. Opt-in — only starts with `--profile local-ai`.
  # Cloud setups (Ollama Cloud / OpenAI) leave this off and set AI in .env.backend.
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-ai"]
    environment:
      # Space-separated models pulled on first boot. Setup A (cloud chat + local
      # embeddings) can slim this to just:  nomic-embed-text
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-nomic-embed-text gemma3:4b}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/backend/Dockerfile.backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../secret/.env.backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      # AI host/keys come from .env.backend (OLLAMA_BASE_URL etc.) so the same image
      # serves local or cloud. No ollama dependency — AI is called lazily, not at boot.
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/backend/Dockerfile.backend
    command: arq app.workers.settings.WorkerSettings
    env_file:
      - ../secret/.env.backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      # AI host/keys come from .env.backend (see api service above).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  ollama_data:
